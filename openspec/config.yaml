schema: spec-driven

context: |
  Tech stack: TypeScript, React 19, React Native 0.81, Expo 54, Expo Router 6.
  Architecture: Feature-first modules with documented Clean Architecture layering.
  Testing: No test runner configured in package scripts or dependencies.
  Style: TypeScript strict mode enabled, no linter/formatter configured.

strict_tdd: false

testing:
  strict_tdd_mode: disabled
  detected: "2026-05-05"
  test_runner:
    available: false
    framework: "—"
    command: "—"
  layers:
    unit:
      available: false
      tool: "—"
    integration:
      available: false
      tool: "—"
    e2e:
      available: false
      tool: "—"
  coverage:
    available: false
    command: "—"
  quality_tools:
    linter:
      available: false
      command: "—"
    type_checker:
      available: true
      command: "npx tsc --noEmit"
    formatter:
      available: false
      command: "—"

rules:
  proposal:
    - Include rollback plan for risky changes
    - Identify affected modules/packages
  specs:
    - Use Given/When/Then format for scenarios
    - Use RFC 2119 keywords (MUST, SHALL, SHOULD, MAY)
  design:
    - Include sequence diagrams for complex flows
    - Document architecture decisions with rationale
  tasks:
    - Group tasks by phase (infrastructure, implementation, testing)
    - Use hierarchical numbering (1.1, 1.2, etc.)
    - Keep tasks small enough to complete in one session
  apply:
    - Follow existing code patterns and conventions
  verify:
    - Run tests if test infrastructure exists
    - Compare implementation against every spec scenario
  archive:
    - Warn before merging destructive deltas (large removals)
