name: CI Quality

on:
  pull_request:
  workflow_dispatch:

jobs:
  quality-gates:
    name: Typecheck, tests, and coverage gate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm run test

      - name: Coverage
        run: npm run coverage

      - name: Enforce baseline coverage and print measured vs required
        env:
          COVERAGE_MINIMUM: "12"
        run: node src/ci/quality-gate.cli.mjs coverage/coverage-summary.json "$COVERAGE_MINIMUM"
